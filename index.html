<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>ProctorIQ | Professional Assessment Platform</title>
    <!-- SheetJS for Excel/CSV parsing -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4361ee;
            --primary-dark: #3b4fdb;
            --secondary: #7209b7;
            --success: #06ffa5;
            --warning: #ffb700;
            --danger: #ff4d4d;
            --dark: #0a0c15;
            --card-bg: rgba(18, 22, 35, 0.95);
            --text-primary: #ffffff;
            --text-secondary: #b0b3c8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0c15 0%, #121623 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-primary);
        }

        /* Particle Background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(67, 97, 238, 0.4), transparent);
            border-radius: 50%;
            animation: floatParticle 15s infinite linear;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Glass Morphism Card */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
        }

        .panel {
            max-width: 520px;
            margin: 1rem auto;
            padding: 2rem;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 800;
            background: linear-gradient(135deg, #4361ee, #7209b7, #f72585);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        h2 {
            font-size: clamp(1.3rem, 4vw, 1.8rem);
            font-weight: 700;
            color: var(--text-primary);
        }

        h3 {
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Buttons */
        .btn {
            padding: clamp(10px, 3vw, 14px) clamp(24px, 5vw, 32px);
            border-radius: 60px;
            font-weight: 600;
            font-size: clamp(0.85rem, 2.5vw, 0.95rem);
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(67, 97, 238, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-success {
            background: linear-gradient(135deg, #06ffa5, #0d9488);
            color: #0a0c15;
            font-weight: 700;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4d4d, #dc2626);
            color: white;
        }

        /* Input Fields */
        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.85rem;
        }

        .input-field {
            width: 100%;
            padding: 12px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 60px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        }

        /* Timer */
        .timer-card {
            background: linear-gradient(135deg, #1a1f2e, #0f111f);
            padding: 10px 20px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(6, 255, 165, 0.3);
        }

        .timer-display {
            font-family: 'Courier New', monospace;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 800;
            color: #06ffa5;
            letter-spacing: 2px;
        }

        /* Progress */
        .progress-container {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            height: 8px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--primary), var(--secondary), #f72585);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 30px;
        }

        /* Responsive Grid */
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .grid-layout {
                grid-template-columns: 1fr 280px;
                gap: 2rem;
            }
            .container {
                padding: 24px;
            }
        }

        @media (min-width: 1024px) {
            .grid-layout {
                grid-template-columns: 1fr 320px;
            }
        }

        /* Question Card */
        .question-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 28px;
            padding: clamp(1.2rem, 4vw, 1.8rem);
            border: 1px solid var(--border);
        }

        .question-text {
            font-size: clamp(1.1rem, 4vw, 1.3rem);
            font-weight: 600;
            color: white;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        /* Options */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 12px 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover {
            background: rgba(67, 97, 238, 0.2);
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .option.selected {
            background: linear-gradient(135deg, rgba(67, 97, 238, 0.3), rgba(114, 9, 183, 0.3));
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(67, 97, 238, 0.3);
        }

        .option-prefix {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            flex-shrink: 0;
        }

        .option span:last-child {
            color: white;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            word-break: break-word;
            flex: 1;
        }

        /* Palette */
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 52px));
            gap: 10px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            padding: 5px;
        }

        .palette-item {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 10px 0;
            text-align: center;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            color: #a0aec0;
            font-size: 0.9rem;
        }

        .palette-item.answered {
            background: linear-gradient(135deg, #06ffa5, #0d9488);
            color: #0a0c15;
        }

        .palette-item.current {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            transform: scale(1.05);
            box-shadow: 0 0 12px rgba(67, 97, 238, 0.5);
        }

        /* Results Table */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 1rem 0;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
        }

        .results-table th,
        .results-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .results-table th {
            background: rgba(67, 97, 238, 0.2);
            color: white;
            font-weight: 600;
        }

        .results-table td {
            color: var(--text-secondary);
        }

        .correct-row {
            background: rgba(6, 255, 165, 0.08);
            border-left: 3px solid #06ffa5;
        }

        .incorrect-row {
            background: rgba(255, 77, 77, 0.08);
            border-left: 3px solid #ff4d4d;
        }

        .correct-row td, .incorrect-row td {
            color: white;
        }

        /* Score Card */
        .score-card {
            background: linear-gradient(135deg, #1a1f2e, #0f111f);
            border-radius: 28px;
            padding: 2rem;
            text-align: center;
            margin: 1.5rem 0;
        }

        .score-number {
            font-size: clamp(3rem, 10vw, 4.5rem);
            font-weight: 800;
            background: linear-gradient(135deg, #06ffa5, #4361ee, #f72585);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-warning {
            background: rgba(255, 183, 0, 0.2);
            color: #ffb700;
            border: 1px solid #ffb700;
        }

        .badge-success {
            background: rgba(6, 255, 165, 0.2);
            color: #06ffa5;
            border: 1px solid #06ffa5;
        }

        /* Admin Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(67, 97, 238, 0.15), rgba(114, 9, 183, 0.1));
            border-radius: 20px;
            padding: 1.2rem;
            text-align: center;
            border: 1px solid var(--border);
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin: 1.5rem 0;
        }

        @media (min-width: 768px) {
            .admin-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 2rem;
            }
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #1a1f2e, #0f111f);
            color: white;
            padding: 14px 24px;
            border-radius: 60px;
            z-index: 10000;
            font-weight: 500;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            animation: slideIn 0.3s ease;
            max-width: 90vw;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .test-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .nav-buttons .btn {
            flex: 1;
            min-width: 100px;
        }

        .footer-icons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="particles" id="particles"></div>
<canvas id="confetti-canvas"></canvas>
<div class="container" id="appRoot"></div>

<script>
    // ==================== STORAGE KEYS ====================
    const STORAGE_EXAMS = 'proctoriq_exams_v5';
    const STORAGE_ATTEMPTS = 'proctoriq_attempts_v5';
    const STORAGE_ACTIVE_SESSION = 'proctoriq_session_v5';
    const STORAGE_CURRENT_EXAM = 'proctoriq_current_exam_v5';

    // ==================== DEFAULT QUESTIONS ====================
    const DEFAULT_QUESTIONS = [
        { sr_no: 1, question: "What is the capital of France?", option_a: "Berlin", option_b: "Madrid", option_c: "Paris", option_d: "Lisbon", correct_answer: "Paris", category: "Geography" },
        { sr_no: 2, question: "Which planet is known as the Red Planet?", option_a: "Earth", option_b: "Mars", option_c: "Jupiter", option_d: "Venus", correct_answer: "Mars", category: "Astronomy" },
        { sr_no: 3, question: "Who painted the Mona Lisa?", option_a: "Van Gogh", option_b: "Picasso", option_c: "Da Vinci", option_d: "Rembrandt", correct_answer: "Da Vinci", category: "Art" },
        { sr_no: 4, question: "What is 5 × 8?", option_a: "35", option_b: "40", option_c: "45", option_d: "30", correct_answer: "40", category: "Mathematics" },
        { sr_no: 5, question: "Which HTML tag is used for an unordered list?", option_a: "<ol>", option_b: "<li>", option_c: "<ul>", option_d: "<list>", correct_answer: "<ul>", category: "Programming" },
        { sr_no: 6, question: "What does CSS stand for?", option_a: "Creative Style Sheets", option_b: "Cascading Style Sheets", option_c: "Computer Style Sheets", option_d: "Colorful Style Sheets", correct_answer: "Cascading Style Sheets", category: "Programming" },
        { sr_no: 7, question: "Who wrote 'Hamlet'?", option_a: "Charles Dickens", option_b: "Mark Twain", option_c: "William Shakespeare", option_d: "Jane Austen", correct_answer: "William Shakespeare", category: "Literature" },
        { sr_no: 8, question: "What is the largest ocean on Earth?", option_a: "Atlantic Ocean", option_b: "Indian Ocean", option_c: "Arctic Ocean", option_d: "Pacific Ocean", correct_answer: "Pacific Ocean", category: "Geography" },
        { sr_no: 9, question: "Which year did World War II end?", option_a: "1943", option_b: "1944", option_c: "1945", option_d: "1946", correct_answer: "1945", category: "History" },
        { sr_no: 10, question: "What is the square root of 64?", option_a: "6", option_b: "7", option_c: "8", option_d: "9", correct_answer: "8", category: "Mathematics" }
    ];

    // ==================== INITIALIZATION ====================
    function initDefaultExam() {
        let exams = getExams();
        if (!exams['EXAM2024']) {
            exams['EXAM2024'] = {
                questions: [...DEFAULT_QUESTIONS],
                timerMinutes: 30,
                createdAt: new Date().toISOString(),
                totalAttempts: 0,
                averageScore: 0
            };
            saveExams(exams);
        }
    }

    function getExams() {
        const stored = localStorage.getItem(STORAGE_EXAMS);
        return stored ? JSON.parse(stored) : {};
    }

    function saveExams(exams) {
        localStorage.setItem(STORAGE_EXAMS, JSON.stringify(exams));
    }

    function getAttempts() {
        const stored = localStorage.getItem(STORAGE_ATTEMPTS);
        return stored ? JSON.parse(stored) : [];
    }

    function saveAttempts(attempts) {
        localStorage.setItem(STORAGE_ATTEMPTS, JSON.stringify(attempts));
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function buildShuffledTest(questionsMaster) {
        let shuffledFull = shuffleArray([...questionsMaster]);
        const optionsMapping = {};
        for (let i = 0; i < shuffledFull.length; i++) {
            const q = shuffledFull[i];
            const opts = [q.option_a, q.option_b, q.option_c, q.option_d];
            optionsMapping[i] = shuffleArray([...opts]);
        }
        return { shuffledQuestions: shuffledFull, optionsMapping };
    }

    // ==================== ANTI-CHEAT ====================
    function enforceAntiCheat() {
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('copy', (e) => e.preventDefault());
        document.addEventListener('cut', (e) => e.preventDefault());
        document.addEventListener('paste', (e) => e.preventDefault());
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'x')) || 
                e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && e.key === 'I') ||
                (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
            }
        });
    }

    // ==================== PARTICLES BACKGROUND ====================
    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 60 + 20;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.animationDelay = `${Math.random() * 20}s`;
            particle.style.animationDuration = `${Math.random() * 15 + 10}s`;
            container.appendChild(particle);
        }
    }
    createParticles();

    // ==================== GLOBAL STATE ====================
    let currentView = 'landing';
    let currentStudentName = null;
    let currentExamCode = null;
    let testSession = null;
    let currentQIndex = 0;
    let intervalTimer = null;
    let warningCount = 0;

    function persistSession(sessionData) {
        localStorage.setItem(STORAGE_ACTIVE_SESSION, JSON.stringify(sessionData));
        localStorage.setItem(STORAGE_CURRENT_EXAM, currentExamCode);
    }

    function clearPersistedSession() {
        localStorage.removeItem(STORAGE_ACTIVE_SESSION);
        localStorage.removeItem(STORAGE_CURRENT_EXAM);
    }

    function showNotification(msg, type = "info") {
        const colors = { success: '#06ffa5', warning: '#ffb700', error: '#ff4d4d', info: '#4361ee' };
        const notification = document.createElement('div');
        notification.className = 'notification';
        notification.style.background = colors[type] || colors.info;
        notification.innerHTML = `${type === 'success' ? '✓' : type === 'warning' ? '⚠' : type === 'error' ? '✗' : 'ℹ'} ${msg}`;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 3000);
    }

    function startTest(examCode, studentName, resume = false, savedData = null) {
        const exams = getExams();
        const exam = exams[examCode];
        if (!exam) { 
            showNotification("Exam code not found! Please check with your instructor.", "error"); 
            return false; 
        }

        currentExamCode = examCode;
        currentStudentName = studentName;

        if (resume && savedData) {
            testSession = savedData;
            currentQIndex = testSession.currentIndex || 0;
            startTimerFromRemaining(testSession.remainingSecs);
        } else {
            const { shuffledQuestions, optionsMapping } = buildShuffledTest(exam.questions);
            const newSession = {
                studentName, 
                examCode, 
                startTime: Date.now(),
                questions: shuffledQuestions, 
                optionsMapping, 
                answers: {},
                remainingSecs: exam.timerMinutes * 60, 
                currentIndex: 0
            };
            testSession = newSession;
            currentQIndex = 0;
            startTimerFromRemaining(newSession.remainingSecs);
            persistSession(newSession);
        }
        currentView = 'test';
        renderApp();
        return true;
    }

    function startTimerFromRemaining(secs) {
        if (intervalTimer) clearInterval(intervalTimer);
        intervalTimer = setInterval(() => {
            if (currentView !== 'test' || !testSession) return;
            if (testSession.remainingSecs <= 0) {
                clearInterval(intervalTimer);
                intervalTimer = null;
                autoSubmitTest();
            } else {
                testSession.remainingSecs--;
                persistSession(testSession);
                const timerEl = document.getElementById('timerDisplay');
                if (timerEl) {
                    let mins = Math.floor(testSession.remainingSecs / 60);
                    let secs = testSession.remainingSecs % 60;
                    timerEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                }
                if (testSession.remainingSecs === 300) showNotification("5 minutes remaining!", "warning");
                if (testSession.remainingSecs === 60) showNotification("1 minute remaining!", "warning");
                if (testSession.remainingSecs === 0) autoSubmitTest();
            }
        }, 1000);
    }

    function autoSubmitTest() {
        if (intervalTimer) clearInterval(intervalTimer);
        if (currentView === 'test' && testSession) {
            showNotification("Time's up! Submitting your test...", "warning");
            submitTestAndSave();
        }
    }

    function submitTestAndSave() {
        if (!testSession) {
            console.error("No test session found");
            return;
        }
        
        const questionsList = testSession.questions;
        const answers = testSession.answers;
        let score = 0;
        const review = [];
        
        for (let i = 0; i < questionsList.length; i++) {
            const q = questionsList[i];
            const userAns = answers[i] || null;
            const isCorrect = (userAns === q.correct_answer);
            if (isCorrect) score++;
            review.push({
                question: q.question,
                correct: q.correct_answer,
                userAnswer: userAns || "Not Answered",
                status: isCorrect
            });
        }
        
        const total = questionsList.length;
        const percentage = (score / total) * 100;
        let grade = '';
        let gradeColor = '';
        if (percentage >= 90) { grade = 'A+ (Outstanding)'; gradeColor = '#06ffa5'; }
        else if (percentage >= 75) { grade = 'A (Excellent)'; gradeColor = '#06ffa5'; }
        else if (percentage >= 60) { grade = 'B (Good)'; gradeColor = '#ffb700'; }
        else if (percentage >= 45) { grade = 'C (Average)'; gradeColor = '#ffb700'; }
        else { grade = 'F (Needs Improvement)'; gradeColor = '#ff4d4d'; }

        const attemptRecord = {
            studentName: testSession.studentName,
            examCode: testSession.examCode,
            timestamp: new Date().toISOString(),
            formattedDate: new Date().toLocaleString(),
            score: score,
            total: total,
            percentage: percentage,
            grade: grade,
            reviewDetails: review
        };
        
        const attempts = getAttempts();
        attempts.push(attemptRecord);
        saveAttempts(attempts);
        
        // Update exam stats
        const exams = getExams();
        if (exams[testSession.examCode]) {
            const examAttempts = attempts.filter(a => a.examCode === testSession.examCode);
            const avgScore = examAttempts.reduce((sum, a) => sum + a.percentage, 0) / examAttempts.length;
            exams[testSession.examCode].averageScore = avgScore;
            exams[testSession.examCode].totalAttempts = (exams[testSession.examCode].totalAttempts || 0) + 1;
            saveExams(exams);
        }

        window.lastResult = { 
            score, total, percentage, grade, review, 
            studentName: testSession.studentName, 
            examCode: testSession.examCode,
            gradeColor
        };
        
        // Confetti for good scores
        if (percentage >= 75) {
            startConfetti();
            showNotification("Excellent performance! 🎉", "success");
        }
        
        clearPersistedSession();
        if (intervalTimer) clearInterval(intervalTimer);
        intervalTimer = null;
        currentView = 'results';
        renderApp();
    }

    function startConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const particles = [];
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                size: Math.random() * 8 + 3,
                speedY: Math.random() * 6 + 2,
                speedX: (Math.random() - 0.5) * 3,
                color: `hsl(${Math.random() * 360}, 80%, 65%)`,
                rotation: Math.random() * 360
            });
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let active = false;
            for (let p of particles) {
                p.y += p.speedY;
                p.x += p.speedX;
                p.rotation += 8;
                if (p.y < canvas.height + 100) active = true;
                if (p.y > canvas.height) p.y = -50;
                if (p.x > canvas.width) p.x = 0;
                if (p.x < 0) p.x = canvas.width;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();
            }
            if (active) requestAnimationFrame(animate);
        }
        animate();
        setTimeout(() => ctx.clearRect(0, 0, canvas.width, canvas.height), 5000);
    }

    // ==================== ADMIN FUNCTIONS ====================
    function uploadExcelToExam(file, examCode, timerValue, callback) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet);
            const newQuestions = [];
            for (let row of rows) {
                if (row.sr_no && row.question && row.option_a && row.option_b && row.option_c && row.option_d && row.correct_answer) {
                    newQuestions.push({
                        sr_no: row.sr_no,
                        question: row.question,
                        option_a: row.option_a,
                        option_b: row.option_b,
                        option_c: row.option_c,
                        option_d: row.option_d,
                        correct_answer: row.correct_answer,
                        category: row.category || "General"
                    });
                }
            }
            if (newQuestions.length) {
                const exams = getExams();
                exams[examCode] = {
                    questions: newQuestions,
                    timerMinutes: timerValue,
                    createdAt: new Date().toISOString(),
                    totalAttempts: 0,
                    averageScore: 0
                };
                saveExams(exams);
                showNotification(`Exam "${examCode}" created with ${newQuestions.length} questions!`, "success");
                callback(true);
            } else {
                showNotification("Invalid format. Please use the template.", "error");
                callback(false);
            }
        };
        reader.readAsArrayBuffer(file);
    }

            wsData.push([q.sr_no, q.question, q.option_a, q.option_b, q.option_c, q.option_d, q.correct_answer, q.category]);

        const ws = XLSX.utils.aoa_to_sheet(wsData);

        XLSX.writeFile(wb, 'exam_template.xlsx');

                    <button id="logoutBtn" class="btn btn-secondary"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
        `;
        
        window.deleteExamWrapper = (code) => deleteExam(code);
        
        document.getElementById('createExamBtn').onclick = () => {
            const code = document.getElementById('newExamCode').value.trim().toUpperCase();
            const timer = parseInt(document.getElementById('newExamTimer').value);
            const file = document.getElementById('examQuestionsFile').files[0];
            if (!code) { showNotification("Please enter exam code!", "warning"); return; }
            if (!timer || timer < 1) { showNotification("Please enter valid time limit!", "warning"); return; }
            if (!file) { showNotification("Please select an Excel/CSV file!", "warning"); return; }
            uploadExcelToExam(file, code, timer, (s) => { if (s) renderAdmin(); });
        };
        document.getElementById('templateBtn').onclick = () => downloadTemplate();
        document.getElementById('exportBtn').onclick = () => exportResults();
        document.getElementById('resetBtn').onclick = () => resetAllData();
        document.getElementById('logoutBtn').onclick = () => { currentView = 'landing'; renderApp(); };
    }

    // Tab switching detection
    document.addEventListener('visibilitychange', () => {
        if (currentView === 'test' && testSession && document.hidden) {
            warningCount++;
            showNotification(`⚠️ Tab switching detected (${warningCount})! This incident has been logged.`, "warning");
        }
    });
    
    initDefaultExam();
    renderApp();
</script>
</body>
</html>
