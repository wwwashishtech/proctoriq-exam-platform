<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ProctorIQ Elite | Enterprise Assessment Suite v3.0</title>
    <!-- SheetJS for Excel/CSV parsing -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <!-- Chart.js for analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #764ba2;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0a0c10;
            --darker: #050608;
            --light: #f3f4f6;
            --gray: #6c757d;
        }

        body {
            font-family: 'Poppins', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Dynamic Gradient Background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.3) 0%, rgba(10, 12, 16, 0.98) 100%),
                        repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 8px);
            z-index: -2;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .animated-bg span {
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0.5; }
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Glassmorphism Enhanced */
        .glass-card {
            background: rgba(20, 24, 32, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6);
        }

        .panel {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2.5rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb, #facc15);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            animation: gradientShift 3s ease infinite;
            background-size: 300% 300%;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Modern Button Styles with Ripple Effect */
        .btn {
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::after {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #d97706);
            color: white;
        }

        /* Enhanced Input Fields */
        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #a0aec0;
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .input-field {
            width: 100%;
            padding: 14px 20px;
            background: rgba(15, 18, 24, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 60px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
            transform: scale(1.02);
        }

        /* Timer Animation */
        .timer-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 12px 24px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(250, 204, 21, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(250, 204, 21, 0); }
        }

        .timer-display {
            font-family: 'Courier New', monospace;
            font-size: 2rem;
            font-weight: 800;
            color: #facc15;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(250, 204, 21, 0.5);
        }

        /* Progress Bar Enhanced */
        .progress-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            height: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--primary), var(--secondary), #f093fb);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Question Card Enhanced */
        .question-card {
            background: rgba(30, 35, 48, 0.6);
            border-radius: 28px;
            padding: 2rem;
            margin: 1.5rem 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s;
        }

        .question-card:hover {
            border-color: rgba(102, 126, 234, 0.5);
            transform: translateX(5px);
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: white;
            line-height: 1.4;
            margin-bottom: 1.5rem;
        }

        /* Option Styles Enhanced */
        .option {
            background: rgba(15, 18, 24, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 60px;
            padding: 14px 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }

        .option::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, rgba(102, 126, 234, 0.2), transparent);
            transition: width 0.3s;
        }

        .option:hover::before {
            width: 100%;
        }

        .option:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: var(--primary);
            transform: translateX(8px);
        }

        .option.selected {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.4);
        }

        .option-prefix {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
        }

        /* Palette Enhanced */
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(55px, 60px));
            gap: 12px;
            margin-top: 20px;
            max-height: 350px;
            overflow-y: auto;
            padding: 5px;
        }

        .palette-item {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            padding: 12px 0;
            text-align: center;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            color: #a0aec0;
            position: relative;
        }

        .palette-item:hover {
            transform: scale(1.1);
            background: rgba(102, 126, 234, 0.5);
        }

        .palette-item.answered {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.5);
        }

        .palette-item.current {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.8);
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1.1); }
            50% { transform: scale(1.2); }
        }

        /* Results Table Enhanced */
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .results-table th,
        .results-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .results-table th {
            background: rgba(102, 126, 234, 0.2);
            font-weight: 600;
        }

        .correct-row {
            background: rgba(16, 185, 129, 0.1);
            border-left: 4px solid var(--success);
            animation: fadeInLeft 0.5s ease;
        }

        .incorrect-row {
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid var(--danger);
            animation: fadeInLeft 0.5s ease;
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .score-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 28px;
            padding: 2rem;
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
            overflow: hidden;
        }

        .score-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102,126,234,0.1), transparent);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .score-number {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary), #f093fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
            z-index: 1;
        }

        /* Loading Spinner */
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Tooltip */
        .tooltip {
            position: relative;
            display: inline-block;
        }

        .tooltip .tooltip-text {
            visibility: hidden;
            background: rgba(0,0,0,0.8);
            color: white;
            text-align: center;
            padding: 5px 10px;
            border-radius: 6px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 0.75rem;
        }

        .tooltip:hover .tooltip-text {
            visibility: visible;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }
            .question-text {
                font-size: 1.1rem;
            }
            .timer-display {
                font-size: 1.3rem;
            }
            .grid-layout {
                grid-template-columns: 1fr !important;
            }
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 2rem;
        }

        /* Badge Enhanced */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-warning {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(217, 119, 6, 0.2));
            color: #f59e0b;
            border: 1px solid #f59e0b;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid #10b981;
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid #ef4444;
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: rgba(20, 24, 32, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.2);
            animation: fadeInUp 0.3s ease;
        }
    </style>
</head>
<body>
<div class="animated-bg" id="animatedBg"></div>
<div class="bg-gradient"></div>
<canvas id="confetti-canvas"></canvas>
<div class="container" id="appRoot"></div>

<script>
    // ==================== ENHANCED STORAGE SYSTEM ====================
    const STORAGE_EXAMS = 'proctoriq_exams_db_v3';
    const STORAGE_ATTEMPTS = 'proctoriq_attempts_log_v3';
    const STORAGE_ACTIVE_SESSION = 'proctoriq_active_session_v3';
    const STORAGE_CURRENT_EXAM = 'proctoriq_current_exam_v3';
    const STORAGE_SETTINGS = 'proctoriq_settings_v3';
    const STORAGE_ANALYTICS = 'proctoriq_analytics_v3';

    // ==================== ENHANCED DEFAULT QUESTIONS ====================
    const DEFAULT_QUESTIONS = [
        { sr_no: 1, question: "What is the capital of France?", option_a: "Berlin", option_b: "Madrid", option_c: "Paris", option_d: "Lisbon", correct_answer: "Paris", difficulty: "Easy", category: "Geography" },
        { sr_no: 2, question: "Which planet is known as the Red Planet?", option_a: "Earth", option_b: "Mars", option_c: "Jupiter", option_d: "Venus", correct_answer: "Mars", difficulty: "Easy", category: "Astronomy" },
        { sr_no: 3, question: "Who painted the Mona Lisa?", option_a: "Van Gogh", option_b: "Picasso", option_c: "Da Vinci", option_d: "Rembrandt", correct_answer: "Da Vinci", difficulty: "Medium", category: "Art" },
        { sr_no: 4, question: "What is 5 × 8?", option_a: "35", option_b: "40", option_c: "45", option_d: "30", correct_answer: "40", difficulty: "Easy", category: "Mathematics" },
        { sr_no: 5, question: "Which HTML tag is used for an unordered list?", option_a: "<ol>", option_b: "<li>", option_c: "<ul>", option_d: "<list>", correct_answer: "<ul>", difficulty: "Medium", category: "Programming" },
        { sr_no: 6, question: "What does CSS stand for?", option_a: "Creative Style Sheets", option_b: "Cascading Style Sheets", option_c: "Computer Style Sheets", option_d: "Colorful Style Sheets", correct_answer: "Cascading Style Sheets", difficulty: "Easy", category: "Programming" },
        { sr_no: 7, question: "Who wrote 'Hamlet'?", option_a: "Charles Dickens", option_b: "Mark Twain", option_c: "William Shakespeare", option_d: "Jane Austen", correct_answer: "William Shakespeare", difficulty: "Easy", category: "Literature" },
        { sr_no: 8, question: "What is the largest ocean on Earth?", option_a: "Atlantic Ocean", option_b: "Indian Ocean", option_c: "Arctic Ocean", option_d: "Pacific Ocean", correct_answer: "Pacific Ocean", difficulty: "Easy", category: "Geography" },
        { sr_no: 9, question: "Which year did World War II end?", option_a: "1943", option_b: "1944", option_c: "1945", option_d: "1946", correct_answer: "1945", difficulty: "Medium", category: "History" },
        { sr_no: 10, question: "What is the square root of 64?", option_a: "6", option_b: "7", option_c: "8", option_d: "9", correct_answer: "8", difficulty: "Easy", category: "Mathematics" }
    ];

    // ==================== ENHANCED INITIALIZATION ====================
    function initDefaultExam() {
        let exams = getExams();
        if (!exams['PROCTOR2024']) {
            exams['PROCTOR2024'] = {
                questions: [...DEFAULT_QUESTIONS],
                timerMinutes: 30,
                createdAt: new Date().toISOString(),
                createdBy: "System",
                category: "General",
                totalAttempts: 0,
                averageScore: 0
            };
            saveExams(exams);
        }
        
        let settings = getSettings();
        if (!settings) {
            settings = {
                allowResume: true,
                showCorrectAnswers: true,
                enableAnalytics: true,
                theme: "dark",
                autoSaveInterval: 30,
                proctorEnabled: true
            };
            saveSettings(settings);
        }
    }

    function getExams() {
        const stored = localStorage.getItem(STORAGE_EXAMS);
        return stored ? JSON.parse(stored) : {};
    }

    function saveExams(exams) {
        localStorage.setItem(STORAGE_EXAMS, JSON.stringify(exams));
    }

    function getAttempts() {
        const a = localStorage.getItem(STORAGE_ATTEMPTS);
        return a ? JSON.parse(a) : [];
    }

    function saveAttempts(attempts) {
        localStorage.setItem(STORAGE_ATTEMPTS, JSON.stringify(attempts));
        updateAnalytics(attempts);
    }

    function getSettings() {
        const s = localStorage.getItem(STORAGE_SETTINGS);
        return s ? JSON.parse(s) : null;
    }

    function saveSettings(settings) {
        localStorage.setItem(STORAGE_SETTINGS, JSON.stringify(settings));
    }

    function getAnalytics() {
        const a = localStorage.getItem(STORAGE_ANALYTICS);
        return a ? JSON.parse(a) : { totalTests: 0, averageScore: 0, passRate: 0, categoryBreakdown: {} };
    }

    function updateAnalytics(attempts) {
        if (attempts.length === 0) return;
        const totalTests = attempts.length;
        const totalScore = attempts.reduce((sum, a) => sum + a.percentage, 0);
        const averageScore = totalScore / totalTests;
        const passedTests = attempts.filter(a => a.percentage >= 60).length;
        const passRate = (passedTests / totalTests) * 100;
        
        const analytics = {
            totalTests,
            averageScore,
            passRate,
            lastUpdated: new Date().toISOString()
        };
        localStorage.setItem(STORAGE_ANALYTICS, JSON.stringify(analytics));
    }

    // ==================== HELPER FUNCTIONS ====================
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function buildShuffledTest(questionsMaster) {
        let shuffledFull = shuffleArray([...questionsMaster]);
        const optionsMapping = {};
        for (let i = 0; i < shuffledFull.length; i++) {
            const q = shuffledFull[i];
            const opts = [q.option_a, q.option_b, q.option_c, q.option_d];
            const shuffledOpts = shuffleArray([...opts]);
            optionsMapping[i] = shuffledOpts;
        }
        return { shuffledQuestions: shuffledFull, optionsMapping };
    }

    // ==================== ENHANCED ANTI-CHEAT ====================
    function enforceAntiCheat() {
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); return false; });
        document.addEventListener('copy', (e) => { e.preventDefault(); return false; });
        document.addEventListener('cut', (e) => { e.preventDefault(); return false; });
        document.addEventListener('paste', (e) => { e.preventDefault(); return false; });
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'x' || e.key === 'u')) || 
                (e.key === 'F12') || 
                (e.ctrlKey && e.shiftKey && e.key === 'I') ||
                (e.ctrlKey && e.key === 'r')) {
                e.preventDefault();
                showNotification("⚠️ Action blocked: Cheating attempt detected!", "warning");
            }
        });
    }

    // ==================== CONFETTI EFFECT ====================
    function startConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const particles = [];
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                size: Math.random() * 8 + 4,
                speedY: Math.random() * 5 + 3,
                speedX: (Math.random() - 0.5) * 3,
                color: `hsl(${Math.random() * 360}, 70%, 60%)`,
                rotation: Math.random() * 360
            });
        }
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let active = false;
            for (let p of particles) {
                p.y += p.speedY;
                p.x += p.speedX;
                p.rotation += 5;
                if (p.y < canvas.height + 100) active = true;
                if (p.y > canvas.height) p.y = -50;
                if (p.x > canvas.width) p.x = 0;
                if (p.x < 0) p.x = canvas.width;
                
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();
            }
            if (active) requestAnimationFrame(animate);
        }
        animate();
        setTimeout(() => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }, 5000);
    }

    // ==================== TEST FUNCTIONS ====================
    function startTest(examCode, studentName, resume = false, savedData = null) {
        const exams = getExams();
        const exam = exams[examCode];
        if (!exam) {
            showNotification("❌ Exam code not found!", "error");
            return false;
        }

        currentExamCode = examCode;
        currentStudentName = studentName;

        if (resume && savedData) {
            testSession = savedData;
            currentQIndex = testSession.currentIndex || 0;
            startTimerFromRemaining(testSession.remainingSecs);
        } else {
            const { shuffledQuestions, optionsMapping } = buildShuffledTest(exam.questions);
            const timerMin = exam.timerMinutes;
            const newSession = {
                studentName: studentName,
                examCode: examCode,
                startTime: Date.now(),
                questions: shuffledQuestions,
                optionsMapping: optionsMapping,
                answers: {},
                remainingSecs: timerMin * 60,
                currentIndex: 0,
                bookmark: null
            };
            testSession = newSession;
            currentQIndex = 0;
            startTimerFromRemaining(newSession.remainingSecs);
            persistSession(newSession);
        }
        currentView = 'test';
        renderApp();
        return true;
    }

    function startTimerFromRemaining(secs) {
        if (intervalTimer) clearInterval(intervalTimer);
        intervalTimer = setInterval(() => {
            if (currentView !== 'test' || !testSession) return;
            if (testSession.remainingSecs <= 0) {
                clearInterval(intervalTimer);
                intervalTimer = null;
                autoSubmitTest();
            } else {
                testSession.remainingSecs--;
                persistSession(testSession);
                const timerEl = document.getElementById('timerDisplay');
                if (timerEl) {
                    let mins = Math.floor(testSession.remainingSecs / 60);
                    let secs = testSession.remainingSecs % 60;
                    timerEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                    
                    // Warning when 5 minutes left
                    if (testSession.remainingSecs === 300) {
                        showNotification("⏰ 5 minutes remaining!", "warning");
                    }
                }
                if (testSession.remainingSecs === 0) autoSubmitTest();
            }
        }, 1000);
    }

    function autoSubmitTest() {
        if (intervalTimer) clearInterval(intervalTimer);
        if (currentView === 'test' && testSession) {
            showNotification("⏰ Time's up! Submitting your test...", "warning");
            submitTestAndSave();
        }
    }

    function submitTestAndSave() {
        if (!testSession) return;
        const questionsList = testSession.questions;
        const answers = testSession.answers;
        let score = 0;
        const review = [];
        for (let i = 0; i < questionsList.length; i++) {
            const q = questionsList[i];
            const userAns = answers[i] || null;
            const correctAns = q.correct_answer;
            const isCorrect = (userAns === correctAns);
            if (isCorrect) score++;
            review.push({
                question: q.question,
                correct: correctAns,
                userAnswer: userAns || "Not Answered",
                status: isCorrect,
                category: q.category || "General",
                difficulty: q.difficulty || "Medium"
            });
        }
        const total = questionsList.length;
        const percentage = (score / total) * 100;
        let grade = '';
        let gradeColor = '';
        if (percentage >= 90) { grade = 'A+ (Outstanding)'; gradeColor = '#10b981'; }
        else if (percentage >= 75) { grade = 'A (Excellent)'; gradeColor = '#10b981'; }
        else if (percentage >= 60) { grade = 'B (Good)'; gradeColor = '#f59e0b'; }
        else if (percentage >= 45) { grade = 'C (Average)'; gradeColor = '#f59e0b'; }
        else { grade = 'F (Needs Improvement)'; gradeColor = '#ef4444'; }

        const attemptRecord = {
            studentName: testSession.studentName,
            examCode: testSession.examCode,
            timestamp: new Date().toISOString(),
            score: score,
            total: total,
            percentage: percentage,
            grade: grade,
            reviewDetails: review,
            timeSpent: (testSession.timerMinutes * 60 - testSession.remainingSecs) || 0
        };
        const attempts = getAttempts();
        attempts.push(attemptRecord);
        saveAttempts(attempts);
        
        // Update exam stats
        const exams = getExams();
        if (exams[testSession.examCode]) {
            exams[testSession.examCode].totalAttempts = (exams[testSession.examCode].totalAttempts || 0) + 1;
            const examAttempts = attempts.filter(a => a.examCode === testSession.examCode);
            const avgScore = examAttempts.reduce((sum, a) => sum + a.percentage, 0) / examAttempts.length;
            exams[testSession.examCode].averageScore = avgScore;
            saveExams(exams);
        }

        window.lastResult = { score, total, percentage, grade, review, studentName: testSession.studentName, examCode: testSession.examCode, gradeColor };
        
        // Show confetti for high scores
        if (percentage >= 75) {
            startConfetti();
            showNotification("🎉 Congratulations! Excellent performance!", "success");
        }
        
        clearPersistedSession();
        if (intervalTimer) clearInterval(intervalTimer);
        intervalTimer = null;
        currentView = 'results';
        renderApp();
    }

    // ==================== ADMIN FUNCTIONS ====================
    function uploadExcelToExam(file, examCode, timerValue, callback) {
        const reader = new FileReader();
        reader.onload = function (e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet);
            const newQuestions = [];
            for (let row of rows) {
                if (row.sr_no && row.question && row.option_a && row.option_b && row.option_c && row.option_d && row.correct_answer) {
                    newQuestions.push({
                        sr_no: row.sr_no,
                        question: row.question,
                        option_a: row.option_a,
                        option_b: row.option_b,
                        option_c: row.option_c,
                        option_d: row.option_d,
                        correct_answer: row.correct_answer,
                        category: row.category || "General",
                        difficulty: row.difficulty || "Medium"
                    });
                }
            }
            if (newQuestions.length) {
                const exams = getExams();
                exams[examCode] = {
                    questions: newQuestions,
                    timerMinutes: timerValue,
                    createdAt: new Date().toISOString(),
                    createdBy: "Admin",
                    totalAttempts: 0,
                    averageScore: 0
                };
                saveExams(exams);
                showNotification(`✅ Exam "${examCode}" created with ${newQuestions.length} questions!`, "success");
                callback(true);
            } else {
                showNotification("Invalid format. Please use the template.", "error");
                callback(false);
            }
        };
        reader.readAsArrayBuffer(file);
    }

            link.download = `${res.studentName}_${res.examCode}_results.csv`;
            link.click();
            URL.revokeObjectURL(link.href);
            showNotification("Report downloaded successfully!", "success");
        };
        
        document.getElementById('newTestBtn').onclick = () => {
            clearPersistedSession();
            currentView = 'landing';
            renderApp();
        };
    }

    function renderAdmin() {
        const exams = getExams();
        const analytics = getAnalytics();
        let examListHtml = '';
        for (let [code, exam] of Object.entries(exams)) {
            examListHtml += `
                <div class="animate__animated animate__fadeInLeft" style="background: rgba(30, 35, 48, 0.6); border-radius: 16px; padding: 1rem; margin-bottom: 0.8rem; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s;">
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                        <div>
                            <strong style="color: white; font-family: monospace; font-size: 1.1rem;"><i class="fas fa-file-alt"></i> ${code}</strong><br/>
                            <small style="color: #a0aec0;">📄 ${exam.questions.length} questions | ⏱️ ${exam.timerMinutes} minutes</small><br/>
                            <small style="color: #10b981;">📊 ${exam.totalAttempts || 0} attempts | Avg: ${(exam.averageScore || 0).toFixed(1)}%</small>
                        </div>
                        ${code !== 'PROCTOR2024' ? `<button class="btn btn-danger" style="padding: 8px 16px;" onclick="window.deleteExamWrapper('${code}')"><i class="fas fa-trash"></i> Delete</button>` : '<span class="badge badge-warning"><i class="fas fa-star"></i> Default Exam</span>'}
                    </div>
                </div>
            `;
        }
        
        const attempts = getAttempts();
        let attemptsHtml = '';
        attempts.slice().reverse().slice(0, 20).forEach(a => {
            attemptsHtml += `
                <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <td style="padding: 10px;"><strong>${a.studentName}</strong></td>
                    <td style="padding: 10px;"><span class="badge badge-warning">${a.examCode}</span></td>
                    <td style="padding: 10px;">${new Date(a.timestamp).toLocaleString()}</td>
                    <td style="padding: 10px;">${a.score}/${a.total}</td>
                    <td style="padding: 10px;">${a.percentage.toFixed(1)}%</td>
                    <td style="padding: 10px; color: ${a.percentage >= 60 ? '#10b981' : '#ef4444'};">${a.grade.split(' ')[0]}</td>
                </tr>
            `;
        });
        
        root.innerHTML = `
            <div class="glass-card animate__animated animate__fadeIn" style="padding: 2rem;">
                <h2 style="color: white;"><i class="fas fa-crown"></i> Admin Control Center</h2>
                
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin: 2rem 0;">
                    <div style="background: linear-gradient(135deg, #667eea20, #764ba220); border-radius: 20px; padding: 1.2rem;">
                        <i class="fas fa-chart-line" style="font-size: 2rem; color: #667eea;"></i>
                        <h3 style="color: white; margin-top: 0.5rem;">${analytics.totalTests || 0}</h3>
                        <p style="color: #a0aec0;">Total Tests Taken</p>
                    </div>
                    <div style="background: linear-gradient(135deg, #10b98120, #05966920); border-radius: 20px; padding: 1.2rem;">
                        <i class="fas fa-percent" style="font-size: 2rem; color: #10b981;"></i>
                        <h3 style="color: white; margin-top: 0.5rem;">${(analytics.averageScore || 0).toFixed(1)}%</h3>
                        <p style="color: #a0aec0;">Average Score</p>
                    </div>
                    <div style="background: linear-gradient(135deg, #f59e0b20, #d9770620); border-radius: 20px; padding: 1.2rem;">
                        <i class="fas fa-trophy" style="font-size: 2rem; color: #f59e0b;"></i>
                        <h3 style="color: white; margin-top: 0.5rem;">${(analytics.passRate || 0).toFixed(1)}%</h3>
                        <p style="color: #a0aec0;">Pass Rate</p>
                    </div>
                </div>
                
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2rem; margin: 2rem 0;">
                    <div>
                        <h3 style="color: white;"><i class="fas fa-plus-circle"></i> Create New Exam</h3>
                        <div class="input-group">
                            <label>Exam Code</label>
                            <input type="text" id="newExamCode" class="input-field" placeholder="e.g., FINAL2025">
                        </div>
                        <div class="input-group">
                            <label>Time Limit (minutes)</label>
                            <input type="number" id="newExamTimer" class="input-field" value="30">
                        </div>
                        <div class="input-group">
                            <label>Upload Questions (Excel/CSV)</label>
                            <input type="file" id="examQuestionsFile" class="input-field" accept=".xlsx, .csv, .xls">
                        </div>
                        <button id="createExamBtn" class="btn btn-primary" style="width: 100%;"><i class="fas fa-upload"></i> Create Exam</button>
                        <button id="templateBtn" class="btn btn-secondary" style="width: 100%; margin-top: 10px;"><i class="fas fa-download"></i> Download Template</button>
                    </div>
                    
                    <div>
                        <h3 style="color: white;"><i class="fas fa-database"></i> Existing Exams (${Object.keys(exams).length})</h3>
                        <div style="max-height: 400px; overflow-y: auto;">${examListHtml || '<p style="color: #a0aec0;">No exams created yet.</p>'}</div>
                    </div>
                </div>
                
                <h3 style="color: white; margin-top: 2rem;"><i class="fas fa-history"></i> Recent Test Attempts (Last 20)</h3>
                <div style="overflow-x: auto; max-height: 400px; overflow-y: auto;">
                    <table style="width: 100%; color: #a0aec0;">
                        <thead><tr style="background: rgba(102,126,234,0.2);"><th>Student</th><th>Exam</th><th>Date</th><th>Score</th><th>%</th><th>Grade</th></tr></thead>
                        <tbody>${attemptsHtml || '<tr><td colspan="6" style="text-align: center;">No attempts yet</td></tr>'}</tbody>
                    </table>
                </div>
                
                <div style="display: flex; gap: 15px; margin-top: 2rem; flex-wrap: wrap;">
                    <button id="exportResultsBtn" class="btn btn-success"><i class="fas fa-file-excel"></i> Export All Results</button>
                    <button id="resetAllBtn" class="btn btn-danger"><i class="fas fa-radar"></i> Reset Everything</button>
                    <button id="adminLogout" class="btn btn-secondary"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
        `;
        
        window.deleteExamWrapper = (code) => deleteExam(code);
        
        document.getElementById('createExamBtn').onclick = () => {
            const examCode = document.getElementById('newExamCode').value.trim().toUpperCase();
            const timerVal = parseInt(document.getElementById('newExamTimer').value);
            const file = document.getElementById('examQuestionsFile').files[0];
            if (!examCode) { showNotification("Enter exam code!", "warning"); return; }
            if (!timerVal || timerVal < 1) { showNotification("Enter valid timer!", "warning"); return; }
            if (!file) { showNotification("Select Excel/CSV file!", "warning"); return; }
            uploadExcelToExam(file, examCode, timerVal, (success) => { if (success) renderAdmin(); });
        };
        
        document.getElementById('templateBtn').onclick = () => downloadTemplate();
        document.getElementById('exportResultsBtn').onclick = () => exportResults();
        document.getElementById('resetAllBtn').onclick = () => resetAllData();
        document.getElementById('adminLogout').onclick = () => {
            currentView = 'landing';
            renderApp();
        };
    }
    
    // Tab switching detection with warning
    document.addEventListener('visibilitychange', () => {
        if (currentView === 'test' && testSession && document.hidden) {
            warningCount++;
            showNotification(`⚠️ Warning: Tab switching detected (${warningCount})! Academic integrity violation logged.`, "warning");
        }
    });
    
    // Initialize
    initDefaultExam();
    renderApp();
</script>
</body>
</html>
