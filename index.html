<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>ProctorIQ Elite | Enterprise Assessment Suite v4.0</title>
    <!-- SheetJS for Excel/CSV parsing -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark-bg: #0f0f1a;
            --card-bg: rgba(25, 28, 38, 0.92);
            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;
            --border: rgba(255, 255, 255, 0.12);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-primary);
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.15), transparent 50%);
            animation: rotate 30s linear infinite;
        }

        .bg-animation::after {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 80% 30%, rgba(139, 92, 246, 0.1), transparent 60%);
            animation: rotateReverse 25s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotateReverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 16px;
            position: relative;
            z-index: 1;
        }

        /* Glass Card - High Contrast */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        .panel {
            max-width: 550px;
            margin: 1rem auto;
            padding: 1.8rem;
        }

        /* Typography - High Contrast */
        h1 {
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        h2 {
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            color: var(--text-primary);
            font-weight: 600;
        }

        h3 {
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            color: var(--text-primary);
            font-weight: 600;
        }

        p, span, label, .text-muted {
            color: var(--text-secondary);
        }

        /* Buttons */
        .btn {
            padding: clamp(10px, 3vw, 14px) clamp(20px, 5vw, 28px);
            border-radius: 60px;
            font-weight: 600;
            font-size: clamp(0.85rem, 2.5vw, 0.95rem);
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
        }

        /* Input Fields */
        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.85rem;
        }

        .input-field {
            width: 100%;
            padding: 12px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 60px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* Timer */
        .timer-card {
            background: linear-gradient(135deg, #1e1b2e, #0a0a14);
            padding: 10px 20px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(250, 204, 21, 0.4);
        }

        .timer-display {
            font-family: 'Courier New', monospace;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 800;
            color: #facc15;
            letter-spacing: 2px;
        }

        /* Progress */
        .progress-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            height: 8px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 30px;
        }

        /* Responsive Grid */
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .grid-layout {
                grid-template-columns: 1fr 300px;
                gap: 1.8rem;
            }
            .container {
                padding: 20px;
            }
            .panel {
                padding: 2.5rem;
                margin: 2rem auto;
            }
        }

        /* Question Card */
        .question-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            padding: clamp(1.2rem, 4vw, 1.8rem);
            border: 1px solid var(--border);
        }

        .question-text {
            font-size: clamp(1.1rem, 4vw, 1.3rem);
            font-weight: 600;
            color: white;
            line-height: 1.4;
            margin-bottom: 1.5rem;
        }

        /* Options - High Contrast */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 12px 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
            transform: translateX(4px);
        }

        .option.selected {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.3), rgba(139, 92, 246, 0.3));
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.3);
        }

        .option-prefix {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            flex-shrink: 0;
        }

        .option span:last-child {
            color: white;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            word-break: break-word;
            flex: 1;
        }

        /* Palette */
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 52px));
            gap: 10px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            padding: 5px;
        }

        .palette-item {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 10px 0;
            text-align: center;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            color: #a0aec0;
            font-size: 0.9rem;
        }

        .palette-item.answered {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
        }

        .palette-item.current {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            transform: scale(1.05);
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.5);
        }

        /* Results Table */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 1rem 0;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
        }

        .results-table th,
        .results-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .results-table th {
            background: rgba(99, 102, 241, 0.15);
            color: white;
            font-weight: 600;
        }

        .correct-row {
            background: rgba(16, 185, 129, 0.1);
            border-left: 3px solid var(--success);
        }

        .incorrect-row {
            background: rgba(239, 68, 68, 0.1);
            border-left: 3px solid var(--danger);
        }

        .correct-row td, .incorrect-row td {
            color: white;
        }

        /* Score Card */
        .score-card {
            background: linear-gradient(135deg, #1e1b2e, #0a0a14);
            border-radius: 24px;
            padding: 1.8rem;
            text-align: center;
            margin: 1.5rem 0;
        }

        .score-number {
            font-size: clamp(3rem, 10vw, 4.5rem);
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            border: 1px solid #f59e0b;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid #10b981;
        }

        /* Admin Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(139, 92, 246, 0.1));
            border-radius: 20px;
            padding: 1.2rem;
            text-align: center;
            border: 1px solid var(--border);
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin: 1.5rem 0;
        }

        @media (min-width: 768px) {
            .admin-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 2rem;
            }
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 16px;
            right: 16px;
            left: 16px;
            background: #1e1b2e;
            color: white;
            padding: 14px 20px;
            border-radius: 60px;
            z-index: 10000;
            font-weight: 500;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }

        @media (min-width: 768px) {
            .notification {
                top: 20px;
                right: 20px;
                left: auto;
                max-width: 400px;
            }
        }

        .test-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .nav-buttons .btn {
            flex: 1;
            min-width: 100px;
        }

        .footer-icons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="bg-animation"></div>
<canvas id="confetti-canvas"></canvas>
<div class="container" id="appRoot"></div>

<script>
    // ==================== STORAGE KEYS ====================
    const STORAGE_EXAMS = 'proctoriq_exams_v4';
    const STORAGE_ATTEMPTS = 'proctoriq_attempts_v4';
    const STORAGE_ACTIVE_SESSION = 'proctoriq_session_v4';
    const STORAGE_CURRENT_EXAM = 'proctoriq_current_exam_v4';

    // ==================== DEFAULT QUESTIONS ====================
    const DEFAULT_QUESTIONS = [
        { sr_no: 1, question: "What is the capital of France?", option_a: "Berlin", option_b: "Madrid", option_c: "Paris", option_d: "Lisbon", correct_answer: "Paris", category: "Geography" },
        { sr_no: 2, question: "Which planet is known as the Red Planet?", option_a: "Earth", option_b: "Mars", option_c: "Jupiter", option_d: "Venus", correct_answer: "Mars", category: "Astronomy" },
        { sr_no: 3, question: "Who painted the Mona Lisa?", option_a: "Van Gogh", option_b: "Picasso", option_c: "Da Vinci", option_d: "Rembrandt", correct_answer: "Da Vinci", category: "Art" },
        { sr_no: 4, question: "What is 5 × 8?", option_a: "35", option_b: "40", option_c: "45", option_d: "30", correct_answer: "40", category: "Math" },
        { sr_no: 5, question: "Which HTML tag is used for an unordered list?", option_a: "<ol>", option_b: "<li>", option_c: "<ul>", option_d: "<list>", correct_answer: "<ul>", category: "Programming" },
        { sr_no: 6, question: "What does CSS stand for?", option_a: "Creative Style Sheets", option_b: "Cascading Style Sheets", option_c: "Computer Style Sheets", option_d: "Colorful Style Sheets", correct_answer: "Cascading Style Sheets", category: "Programming" },
        { sr_no: 7, question: "Who wrote 'Hamlet'?", option_a: "Charles Dickens", option_b: "Mark Twain", option_c: "William Shakespeare", option_d: "Jane Austen", correct_answer: "William Shakespeare", category: "Literature" },
        { sr_no: 8, question: "What is the largest ocean on Earth?", option_a: "Atlantic Ocean", option_b: "Indian Ocean", option_c: "Arctic Ocean", option_d: "Pacific Ocean", correct_answer: "Pacific Ocean", category: "Geography" },
        { sr_no: 9, question: "Which year did World War II end?", option_a: "1943", option_b: "1944", option_c: "1945", option_d: "1946", correct_answer: "1945", category: "History" },
        { sr_no: 10, question: "What is the square root of 64?", option_a: "6", option_b: "7", option_c: "8", option_d: "9", correct_answer: "8", category: "Math" }
    ];

    function initDefaultExam() {
        let exams = getExams();
        if (!exams['PROCTOR2024']) {
            exams['PROCTOR2024'] = {
                questions: [...DEFAULT_QUESTIONS],
                timerMinutes: 30,
                createdAt: new Date().toISOString(),
                totalAttempts: 0,
                averageScore: 0
            };
            saveExams(exams);
        }
    }

    function getExams() {
        const stored = localStorage.getItem(STORAGE_EXAMS);
        return stored ? JSON.parse(stored) : {};
    }

    function saveExams(exams) {
        localStorage.setItem(STORAGE_EXAMS, JSON.stringify(exams));
    }

    function getAttempts() {
        const a = localStorage.getItem(STORAGE_ATTEMPTS);
        return a ? JSON.parse(a) : [];
    }

    function saveAttempts(attempts) {
        localStorage.setItem(STORAGE_ATTEMPTS, JSON.stringify(attempts));
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function buildShuffledTest(questionsMaster) {
        let shuffledFull = shuffleArray([...questionsMaster]);
        const optionsMapping = {};
        for (let i = 0; i < shuffledFull.length; i++) {
            const q = shuffledFull[i];
            const opts = [q.option_a, q.option_b, q.option_c, q.option_d];
            optionsMapping[i] = shuffleArray([...opts]);
        }
        return { shuffledQuestions: shuffledFull, optionsMapping };
    }

    // Anti-cheat
    function enforceAntiCheat() {
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('copy', (e) => e.preventDefault());
        document.addEventListener('cut', (e) => e.preventDefault());
        document.addEventListener('paste', (e) => e.preventDefault());
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'x')) || e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
            }
        });
    }

    let currentView = 'landing';
    let currentStudentName = null;
    let currentExamCode = null;
    let testSession = null;
    let currentQIndex = 0;
    let intervalTimer = null;

    function persistSession(sessionData) {
        localStorage.setItem(STORAGE_ACTIVE_SESSION, JSON.stringify(sessionData));
        localStorage.setItem(STORAGE_CURRENT_EXAM, currentExamCode);
    }

    function clearPersistedSession() {
        localStorage.removeItem(STORAGE_ACTIVE_SESSION);
        localStorage.removeItem(STORAGE_CURRENT_EXAM);
    }

    function showNotification(msg, type = "info") {
        const colors = { success: '#10b981', warning: '#f59e0b', error: '#ef4444', info: '#6366f1' };
        const notification = document.createElement('div');
        notification.className = 'notification';
        notification.style.background = colors[type] || colors.info;
        notification.innerHTML = `${type === 'success' ? '✅' : type === 'warning' ? '⚠️' : type === 'error' ? '❌' : 'ℹ️'} ${msg}`;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 3000);
    }

    function startTest(examCode, studentName, resume = false, savedData = null) {
        const exams = getExams();
        const exam = exams[examCode];
        if (!exam) { showNotification("Exam code not found!", "error"); return false; }

        currentExamCode = examCode;
        currentStudentName = studentName;

        if (resume && savedData) {
            testSession = savedData;
            currentQIndex = testSession.currentIndex || 0;
            startTimerFromRemaining(testSession.remainingSecs);
        } else {
            const { shuffledQuestions, optionsMapping } = buildShuffledTest(exam.questions);
            const newSession = {
                studentName, examCode, startTime: Date.now(),
                questions: shuffledQuestions, optionsMapping, answers: {},
                remainingSecs: exam.timerMinutes * 60, currentIndex: 0
            };
            testSession = newSession;
            currentQIndex = 0;
            startTimerFromRemaining(newSession.remainingSecs);
            persistSession(newSession);
        }
        currentView = 'test';
        renderApp();
        return true;
    }

    function startTimerFromRemaining(secs) {
        if (intervalTimer) clearInterval(intervalTimer);
        intervalTimer = setInterval(() => {
            if (currentView !== 'test' || !testSession) return;
            if (testSession.remainingSecs <= 0) {
                clearInterval(intervalTimer);
                intervalTimer = null;
                autoSubmitTest();
            } else {
                testSession.remainingSecs--;
                persistSession(testSession);
                const timerEl = document.getElementById('timerDisplay');
                if (timerEl) {
                    let mins = Math.floor(testSession.remainingSecs / 60);
                    let secs = testSession.remainingSecs % 60;
                    timerEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                }
                if (testSession.remainingSecs === 300) showNotification("5 minutes remaining!", "warning");
                if (testSession.remainingSecs === 0) autoSubmitTest();
            }
        }, 1000);
    }

    function autoSubmitTest() {
        if (intervalTimer) clearInterval(intervalTimer);
        if (currentView === 'test' && testSession) {
            showNotification("Time's up! Submitting...", "warning");
            submitTestAndSave();
        }
    }

    function submitTestAndSave() {
        if (!testSession) {
            console.error("No test session found");
            return;
        }
        
        const questionsList = testSession.questions;
        const answers = testSession.answers;
        let score = 0;
        const review = [];
        
        for (let i = 0; i < questionsList.length; i++) {
            const q = questionsList[i];
            const userAns = answers[i] || null;
            const isCorrect = (userAns === q.correct_answer);
            if (isCorrect) score++;
            review.push({
                question: q.question,
                correct: q.correct_answer,
                userAnswer: userAns || "Not Answered",
                status: isCorrect
            });
        }
        
        const total = questionsList.length;
        const percentage = (score / total) * 100;
        let grade = percentage >= 90 ? 'A+ (Outstanding)' : percentage >= 75 ? 'A (Excellent)' : percentage >= 60 ? 'B (Good)' : percentage >= 45 ? 'C (Average)' : 'F (Needs Improvement)';

        const attemptRecord = {
            studentName: testSession.studentName,
            examCode: testSession.examCode,
            timestamp: new Date().toISOString(),
            score: score,
            total: total,
            percentage: percentage,
            grade: grade,
            reviewDetails: review
        };
        
        const attempts = getAttempts();
        attempts.push(attemptRecord);
        saveAttempts(attempts);
        
        // Update exam stats
        const exams = getExams();
        if (exams[testSession.examCode]) {
            const examAttempts = attempts.filter(a => a.examCode === testSession.examCode);
            const avgScore = examAttempts.reduce((sum, a) => sum + a.percentage, 0) / examAttempts.length;
            exams[testSession.examCode].averageScore = avgScore;
            exams[testSession.examCode].totalAttempts = (exams[testSession.examCode].totalAttempts || 0) + 1;
            saveExams(exams);
        }

        window.lastResult = { score, total, percentage, grade, review, studentName: testSession.studentName, examCode: testSession.examCode };
        
        // Confetti for good scores
        if (percentage >= 75) {
            startConfetti();
            showNotification("Excellent performance! 🎉", "success");
        }
        
        clearPersistedSession();
        if (intervalTimer) clearInterval(intervalTimer);
        intervalTimer = null;
        currentView = 'results';
        renderApp();
    }

    function startConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const particles = [];
        for (let i = 0; i < 120; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                size: Math.random() * 7 + 3,
                speedY: Math.random() * 5 + 2,
                speedX: (Math.random() - 0.5) * 2.5,
                color: `hsl(${Math.random() * 360}, 80%, 60%)`,
                rotation: Math.random() * 360
            });
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let active = false;
            for (let p of particles) {
                p.y += p.speedY;
                p.x += p.speedX;
                p.rotation += 8;
                if (p.y < canvas.height + 100) active = true;
                if (p.y > canvas.height) p.y = -50;
                if (p.x > canvas.width) p.x = 0;
                if (p.x < 0) p.x = canvas.width;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();
            }
            if (active) requestAnimationFrame(animate);
        }
        animate();
        setTimeout(() => ctx.clearRect(0, 0, canvas.width, canvas.height), 4500);
    }

    function uploadExcelToExam(file, examCode, timerValue, callback) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet);
            const newQuestions = [];
            for (let row of rows) {
                if (row.sr_no && row.question && row.option_a && row.option_b && row.option_c && row.option_d && row.correct_answer) {
                    newQuestions.push({
                        sr_no: row.sr_no,
                        question: row.question,
                        option_a: row.option_a,
                        option_b: row.option_b,
                        option_c: row.option_c,
                        option_d: row.option_d,
                        correct_answer: row.correct_answer,
                        category: row.category || "General"
                    });
                }
            }
            if (newQuestions.length) {
                const exams = getExams();
                exams[examCode] = {
                    questions: newQuestions,
                    timerMinutes: timerValue,
                    createdAt: new Date().toISOString(),
                    totalAttempts: 0,
                    averageScore: 0
                };
                saveExams(exams);
                showNotification(`Exam "${examCode}" created with ${newQuestions.length} questions!`, "success");
                callback(true);
            } else {
                showNotification("Invalid format. Use template.", "error");
                callback(false);
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function downloadTemplate() {
        const wsData = [['sr_no', 'question', 'option_a', 'option_b', 'option_c', 'option_d', 'correct_answer', 'category']];
        DEFAULT_QUESTIONS.forEach(q => {
            wsData.push([q.sr_no, q.question, q.option_a, q.option_b, q.option_c, q.option_d, q.correct_answer, q.category]);
        });
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'MCQ_Template');
        XLSX.writeFile(wb, 'proctoriq_template.xlsx');
        showNotification("Template downloaded!", "success");
    }

    function resetAllData() {
        if (confirm("⚠️ This will delete ALL exams and attempts!")) {
            localStorage.clear();
            initDefaultExam();
            showNotification("All data reset to default!", "success");
            currentView = 'landing';
            renderApp();
        }
    }

    function deleteExam(examCode) {
        if (examCode === 'PROCTOR2024') {
            showNotification("Cannot delete default exam!", "warning");
            return;
        }
        if (confirm(`Delete exam "${examCode}"?`)) {
            const exams = getExams();
            delete exams[examCode];
            saveExams(exams);
            showNotification(`Exam "${examCode}" deleted!`, "success");
            renderAdmin();
        }
    }

    function exportResults() {
        const attempts = getAttempts();
        if (attempts.length === 0) {
            showNotification("No attempts to export!", "warning");
            return;
        }
        const wsData = [['Student Name', 'Exam Code', 'Date', 'Score', 'Percentage', 'Grade']];
        attempts.forEach(a => {
            wsData.push([a.studentName, a.examCode, new Date(a.timestamp).toLocaleString(), `${a.score}/${a.total}`, `${a.percentage.toFixed(2)}%`, a.grade]);
        });
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Results');
        XLSX.writeFile(wb, `proctoriq_results_${new Date().toISOString().slice(0,10)}.xlsx`);
        showNotification("Results exported!", "success");
    }

    function renderTest() {
        if (!testSession) return;
        const qList = testSession.questions;
        const currQ = qList[currentQIndex];
        const currentAnswer = testSession.answers[currentQIndex] || '';
        const optionsArr = testSession.optionsMapping[currentQIndex];
        const prefix = ['A', 'B', 'C', 'D'];
        const answeredCount = Object.keys(testSession.answers).length;
        const progressPercent = (answeredCount / qList.length) * 100;
        
        root.innerHTML = `
            <div class="glass-card" style="padding: clamp(1rem, 4vw, 1.8rem);">
                <div class="test-header">
                    <div>
                        <h2 style="color:white;"><i class="fas fa-graduation-cap"></i> ${testSession.examCode}</h2>

                    <div class="progress-fill" style="width: ${progressPercent}%"></div>
                </div>
                <p style="color:#94a3b8; text-align:right; margin-bottom: 1rem;">${answeredCount}/${qList.length} Answered</p>
                <div class="grid-layout">
                    <div>
                        <div class="question-card">
                            <div style="display:flex; justify-content:space-between; margin-bottom: 1rem; flex-wrap:wrap; gap:8px;">
                                <span class="badge badge-warning">Question ${currentQIndex+1}/${qList.length}</span>
                                ${currQ.category ? `<span class="badge badge-success">${currQ.category}</span>` : ''}
                            </div>
                            <div class="question-text">${currQ.question}</div>
                            <div class="options-grid" id="optionsContainer"></div>
                        </div>
                        <div class="nav-buttons">
                            <button id="prevBtn" class="btn btn-secondary" ${currentQIndex === 0 ? 'disabled' : ''}><i class="fas fa-arrow-left"></i> Previous</button>
                            <button id="nextBtn" class="btn btn-primary">Next <i class="fas fa-arrow-right"></i></button>
                            ${currentQIndex === qList.length-1 ? '<button id="submitBtn" class="btn btn-success"><i class="fas fa-check-circle"></i> Submit Test</button>' : ''}
                        </div>
                    </div>
                    <div>
                        <h3 style="color:white; margin-bottom: 0.8rem;"><i class="fas fa-palette"></i> Question Palette</h3>
                        <div class="palette-grid" id="paletteGrid"></div>
                        <div style="margin-top: 1rem; font-size: 0.7rem; color:#94a3b8;">
                            <i class="fas fa-circle" style="color:#10b981;"></i> Answered &nbsp;
                            <i class="fas fa-circle" style="color:#6366f1;"></i> Current
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        const optsDiv = document.getElementById('optionsContainer');
        optionsArr.forEach((opt, idx) => {
            const isSelected = (currentAnswer === opt);
            const div = document.createElement('div');
            div.className = `option ${isSelected ? 'selected' : ''}`;
            div.innerHTML = `<span class="option-prefix">${prefix[idx]}</span><span>${opt}</span>`;
            div.onclick = () => {
                testSession.answers[currentQIndex] = opt;
                persistSession(testSession);
                renderTest();
            };
            optsDiv.appendChild(div);
        });
        
        const palette = document.getElementById('paletteGrid');
        for (let i = 0; i < qList.length; i++) {
            const isAnswered = testSession.answers[i] !== undefined;
            const btn = document.createElement('div');
            btn.className = `palette-item ${isAnswered ? 'answered' : ''} ${i === currentQIndex ? 'current' : ''}`;
            btn.innerText = i+1;
            btn.onclick = () => {
                currentQIndex = i;
                testSession.currentIndex = i;
                persistSession(testSession);
                renderTest();
            };
            palette.appendChild(btn);
        }
        
        document.getElementById('prevBtn')?.addEventListener('click', () => {
            if (currentQIndex > 0) {
                currentQIndex--;
                testSession.currentIndex = currentQIndex;
                persistSession(testSession);
                renderTest();
            }
        });
        
        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if (currentQIndex < qList.length - 1) {
                currentQIndex++;
                testSession.currentIndex = currentQIndex;
                persistSession(testSession);
                renderTest();
            }
        });
        
        document.getElementById('submitBtn')?.addEventListener('click', () => {
            if (confirm("Are you sure you want to submit your test?")) {
                submitTestAndSave();
            }
        });
        
        let mins = Math.floor(testSession.remainingSecs / 60);
        let secs = testSession.remainingSecs % 60;
        document.getElementById('timerDisplay').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

        `;

            const code = document.getElementById('newExamCode').value.trim().toUpperCase();

            const file = document.getElementById('examQuestionsFile').files[0];
            if (!code || !timer || !file) { showNotification("Fill all fields!", "warning"); return; }
            uploadExcelToExam(file, code, timer, (s) => { if (s) renderAdmin(); });
        };
        document.getElementById('templateBtn').onclick = () => downloadTemplate();
        document.getElementById('exportBtn').onclick = () => exportResults();
        document.getElementById('resetBtn').onclick = () => resetAllData();
        document.getElementById('logoutBtn').onclick = () => { currentView = 'landing'; renderApp(); };
    }

    let warningCount = 0;
    document.addEventListener('visibilitychange', () => {
        if (currentView === 'test' && testSession && document.hidden) {
            warningCount++;
            showNotification(`⚠️ Tab switching detected (${warningCount})!`, "warning");
        }
    });
    
    initDefaultExam();
    renderApp();
</script>
